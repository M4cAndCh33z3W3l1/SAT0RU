<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJK: Cursed Technique</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
    
        #ui {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        
        h1 { 
            font-size: 3rem; margin: 0; letter-spacing: 10px; 
            font-weight: 900; 
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #technique-name { 
            font-size: 1.2rem; color: #00ffff; margin-top: 15px; 
            font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #color-tracking-info {
            font-size: 0.9rem; color: #88ff88; margin-top: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(136, 255, 136, 0.3);
            opacity: 0.9;
        }

        /* Large Centered Camera Hub - Taller for Reel Context */
        #video-container {
            position: absolute;
            bottom: 2%;
            left: 18%;
            transform: translateX(-50%) scaleX(-1);
            width: 85vw;
            max-width: 450px;
            height: 42vh; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
            background-color: #000; 
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="grain"></div>

    <div id="ui">
        <h1>呪術廻戦</h1>
        <div id="technique-name">CURSED ENERGY</div>
        <div id="color-tracking-info">Mark your fingertips with BLUE • RED • PURPLE to track and move orbs</div>
    </div>

    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene & Rendering ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 55;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    // Add lighting for orbs
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const pointLight = new THREE.PointLight(0xffffff, 1, 200);
    pointLight.position.set(40, 40, 40);
    scene.add(pointLight);

    const COUNT = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
    scene.add(particles);

    // --- Colored Orb Meshes ---
    const orbGroup = new THREE.Group();
    scene.add(orbGroup);
    
    const orbs = {
        blue: [],
        red: [],
        purple: []
    };
    
    // Create orb meshes
    const createOrb = (color) => {
        const geometry = new THREE.IcosahedronGeometry(2, 4);
        const material = new THREE.MeshStandardMaterial({ 
            color: color, 
            emissive: color,
            emissiveIntensity: 2,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const mesh = new THREE.Mesh(geometry, material);
        orbGroup.add(mesh);
        return { mesh, targetPosition: new THREE.Vector3(0, 0, 0) };
    };
    
    // Initialize orbs
    for (let i = 0; i < 5; i++) {
        orbs.blue.push(createOrb(0x0088ff));
        orbs.red.push(createOrb(0xff3333));
        orbs.purple.push(createOrb(0xbb00ff));
    }

    // Technique Functions 
    function getRed(i) {
        if(i < COUNT * 0.1) {
            const r = Math.random() * 9;
            const theta = Math.random() * 6.28; const phi = Math.acos(2 * Math.random() - 1);
            return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 3, g: 0.1, b: 0.1, s: 2.5 };
        } else {
            const armCount = 3; const t = (i / COUNT); 
            const angle = t * 15 + ((i % armCount) * (Math.PI * 2 / armCount));
            const radius = 2 + (t * 40); 
            return { x: radius * Math.cos(angle), y: radius * Math.sin(angle), z: (Math.random() - 0.5) * (10 * t), r: 0.8, g: 0, b: 0, s: 1.0 };
        }
    }

    function getVoid(i) {
        if (i < COUNT * 0.15) {
            const angle = Math.random() * Math.PI * 2;
            return { x: 26 * Math.cos(angle), y: 26 * Math.sin(angle), z: (Math.random()-0.5) * 1, r: 1, g: 1, b: 1, s: 2.5 };
        } else {
            const radius = 30 + Math.random() * 90;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            return { x: radius * Math.sin(phi) * Math.cos(theta), y: radius * Math.sin(phi) * Math.sin(theta), z: radius * Math.cos(phi), r: 0.1, g: 0.6, b: 1.0, s: 0.7 };
        }
    }

    function getPurple(i) {
        if (Math.random() > 0.8) return { x: (Math.random() - 0.5) * 100, y: (Math.random() - 0.5) * 100, z: (Math.random() - 0.5) * 100, r: 0.5, g: 0.5, b: 0.7, s: 0.8 };
        const r = 20; const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1);
        return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 0.6, g: 0.5, b: 1.0, s: 2.5 };
    }

    function getBlue(i) {
        // Compact circle formation instead of spiral
        const t = i / COUNT;
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.sqrt(Math.random()) * 8; // Compact circle with radius ~8
        const verticalVariation = (Math.random() - 0.5) * 4;
        
        return { 
            x: radius * Math.cos(angle), 
            y: verticalVariation,
            z: radius * Math.sin(angle), 
            r: 0.1, 
            g: 0.2, 
            b: 0.9, 
            s: 1.5 
        };
    }

    function getBlueExplosion(i) {
        // Explosion: particles spread outward in all directions
        const angle = Math.random() * Math.PI * 2;
        const elevation = Math.random() * Math.PI;
        const distance = 30 + Math.random() * 40; // Fast outward spread
        
        return {
            x: distance * Math.sin(elevation) * Math.cos(angle),
            y: (Math.random() - 0.5) * 20,
            z: distance * Math.sin(elevation) * Math.sin(angle),
            r: 0.1,
            g: 0.2,
            b: 0.9,
            s: 1.2
        };
    }

    function getShrine(i) {
        const total = COUNT;
        if (i < total * 0.3) return { x: (Math.random()-0.5)*80, y: -15, z: (Math.random()-0.5)*80, r: 0.4, g: 0, b: 0, s: 0.8 };
        else if (i < total * 0.4) {
            const px = ((i%4)<2?1:-1)*12; const pz = ((i%4)%2==0?1:-1)*8;
            return { x: px+(Math.random()-0.5)*2, y: -15+Math.random()*30, z: pz+(Math.random()-0.5)*2, r: 0.2, g: 0.2, b: 0.2, s: 0.6 };
        } else if (i < total * 0.6) {
            const t = Math.random() * Math.PI * 2; const rad = Math.random() * 30;
            const curve = Math.pow(rad/30, 2) * 10; 
            return { x: rad*Math.cos(t), y: 15 - curve + (Math.random()*2), z: rad*Math.sin(t)*0.6, r: 0.6, g: 0, b: 0, s: 0.6 };
        } else return { x: 0, y: 0, z: 0, r: 0, g: 0, b: 0, s: 0 };
    }

    // Hand Tracking
    let currentTech = 'neutral';
    let shakeIntensity = 0;
    let isDragging = false;
    let dragPositionX = 0;
    let dragPositionY = 0;
    let dragVelocityX = 0;
    let dragVelocityY = 0;
    let blueExplosionActive = false;
    let blueExplosionTimer = 0;
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    let glowColor = '#00ffff';

    // Color tracking for orbs
    let coloredOrbPositions = { blue: [], red: [], purple: [] };
    
    function detectColoredFingers(imageData) {
        const data = imageData.data;
        const width = imageData.width;
        const height = imageData.height;
        
        const bluePixels = [];
        const redPixels = [];
        const purplePixels = [];
        
        // Scan for colored pixels
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];
            
            if (a < 100) continue; // Skip transparent pixels
            
            // Detect BLUE (high blue, low red, low green)
            if (b > 150 && r < 100 && g < 100) {
                bluePixels.push(i / 4);
            }
            // Detect RED (high red, low green, low blue)
            else if (r > 150 && g < 100 && b < 100) {
                redPixels.push(i / 4);
            }
            // Detect PURPLE (high red and blue, low green)
            else if (r > 120 && b > 120 && g < 100) {
                purplePixels.push(i / 4);
            }
        }
        
        // Calculate cluster centers for each color
        coloredOrbPositions.blue = clusteredPositions(bluePixels, width, height);
        coloredOrbPositions.red = clusteredPositions(redPixels, width, height);
        coloredOrbPositions.purple = clusteredPositions(purplePixels, width, height);
    }
    
    function clusteredPositions(pixels, width, height) {
        if (pixels.length === 0) return [];
        
        // Fast clustering using spatial proximity
        const pixelSet = new Set(pixels);
        const clusters = [];
        const visited = new Set();
        
        for (const pixel of pixels) {
            if (visited.has(pixel)) continue;
            
            // BFS to find connected cluster
            const cluster = [];
            const queue = [pixel];
            visited.add(pixel);
            
            while (queue.length > 0 && cluster.length < 500) {
                const px = queue.shift();
                cluster.push(px);
                
                // Check neighbors (4-connected)
                const neighbors = [px - 1, px + 1, px - width, px + width];
                for (const nPx of neighbors) {
                    if (pixelSet.has(nPx) && !visited.has(nPx)) {
                        visited.add(nPx);
                        queue.push(nPx);
                    }
                }
            }
            
            if (cluster.length > 20) { // Minimum cluster size
                clusters.push(cluster);
            }
        }
        
        // Calculate center of each cluster
        return clusters.map(cluster => {
            let x = 0, y = 0;
            for (const pixel of cluster) {
                x += pixel % width;
                y += Math.floor(pixel / width);
            }
            return {
                x: (x / cluster.length) / width,
                y: (y / cluster.length) / height
            };
        });
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        let detected = 'neutral';

        if (results.multiHandLandmarks) {
            // Draw all hands first
            results.multiHandLandmarks.forEach((lm) => {
                drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: glowColor, lineWidth: 5});
                drawLandmarks(canvasCtx, lm, {color: '#fff', lineWidth: 1, radius: 2});
            });

            // Detect colored fingers AFTER drawing, so we can get the pixel data
            try {
                const imageData = canvasCtx.getImageData(0, 0, canvasElement.width, canvasElement.height);
                detectColoredFingers(imageData);
            } catch (e) {
                // Cross-origin issue, skip color detection this frame
            }

            // Two hands detected → Malevolent Shrine
            if (results.multiHandLandmarks.length === 2) {
                detected = 'shrine';
                blueExplosionActive = false; // Reset explosion when shrine starts
            }
            // Single hand detection
            else if (results.multiHandLandmarks.length === 1) {
                const lm = results.multiHandLandmarks[0];
                const isUp = (t, p) => lm[t].y < lm[p].y;
                const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
                const indexTip = lm[8], middleTip = lm[12];
                const ringTip = lm[16], pinkyTip = lm[20];
                const indexBase = lm[6], middleBase = lm[10];
                const ringBase = lm[14], pinkyBase = lm[18];
                
                const indexUp = indexTip.y < indexBase.y;
                const middleUp = middleTip.y < middleBase.y;
                const ringUp = ringTip.y < ringBase.y;
                const pinkyUp = pinkyTip.y < pinkyBase.y;
                
                // Check for one hand with all fingers up (for dragging)
                if (indexUp && middleUp && ringUp && pinkyUp) {
                    // All fingers up - can drag blue, purple, or red
                    isDragging = true;
                    const palmCenter = {x: lm[9].x, y: lm[9].y};
                    dragVelocityX = (palmCenter.x - dragPositionX) * 30;
                    dragVelocityY = (palmCenter.y - dragPositionY) * 30;
                    dragPositionX = palmCenter.x;
                    dragPositionY = palmCenter.y;
                    
                    // Detect which technique to drag
                    let baseTech = 'neutral';
                    if (pinch < 0.04) baseTech = 'purple';
                    else if (indexUp && middleUp && ringUp && pinkyUp) baseTech = 'blue'; // All fingers trigger blue dragging
                    
                    detected = baseTech;
                } else {
                    // Regular technique detection
                    const ringDown = ringTip.y > ringBase.y;
                    const pinkyDown = pinkyTip.y > pinkyBase.y;
                    
                    let baseTech = 'neutral';
                    if (pinch < 0.04) baseTech = 'purple';
                    else if (isUp(8,6) && isUp(12,10) && isUp(16,14) && isUp(20,18)) baseTech = 'shrine';
                    else if (isUp(8,6) && isUp(12,10) && !isUp(16,14)) baseTech = 'void';
                    else if (isUp(8,6) && !isUp(12,10)) baseTech = 'red';
                    
                    detected = baseTech;
                    
                    // If blue was active and now it's not, trigger explosion
                    if (currentTech === 'blue' && baseTech !== 'blue') {
                        blueExplosionActive = true;
                        blueExplosionTimer = 0;
                    }
                }
            }
        } else {
            // No hands detected
            if (currentTech === 'blue' && isDragging) {
                blueExplosionActive = true;
                blueExplosionTimer = 0;
            }
            isDragging = false;
        }
        
        updateState(detected);
    });



    function updateState(tech) {
        if(currentTech === tech && !blueExplosionActive) return;
        currentTech = tech;
        const nameEl = document.getElementById('technique-name');
        shakeIntensity = tech !== 'neutral' ? 0.4 : 0;

        if (isDragging && (tech === 'purple' || tech === 'red' || tech === 'blue')) {
            if(tech === 'purple') { glowColor = '#bb00ff'; nameEl.innerText = "Secret Technique: Hollow Purple [DRAGGING]"; bloomPass.strength = 4.0; }
            else if(tech === 'red') { glowColor = '#ff3333'; nameEl.innerText = "Reverse Cursed Technique: Red [DRAGGING]"; bloomPass.strength = 2.5; }
            else if(tech === 'blue') { glowColor = '#0066ff'; nameEl.innerText = "Reverse Cursed Technique: Blue [DRAGGING]"; bloomPass.strength = 3.0; }
        } else {
            if(tech === 'shrine') { glowColor = '#ff0000'; nameEl.innerText = "Domain Expansion: Malevolent Shrine"; bloomPass.strength = 2.5; }
            else if(tech === 'purple') { glowColor = '#bb00ff'; nameEl.innerText = "Secret Technique: Hollow Purple"; bloomPass.strength = 4.0; }
            else if(tech === 'void') { glowColor = '#00ffff'; nameEl.innerText = "Domain Expansion: Infinite Void"; bloomPass.strength = 2.0; }
            else if(tech === 'red') { glowColor = '#ff3333'; nameEl.innerText = "Reverse Cursed Technique: Red"; bloomPass.strength = 2.5; }
            else if(tech === 'blue') { glowColor = '#0066ff'; nameEl.innerText = "Reverse Cursed Technique: Blue"; bloomPass.strength = 3.0; }
            else { glowColor = '#00ffff'; nameEl.innerText = "Neutral State"; bloomPass.strength = 1.0; }
        }

        for(let i=0; i<COUNT; i++) {
            let p;
            if (blueExplosionActive) {
                p = getBlueExplosion(i);
            } else if(tech === 'neutral') {
                if(i < COUNT * 0.05) {
                    const r = 15 + Math.random()*20; const t = Math.random()*6.28; const ph = Math.random()*3.14;
                    p = { x: r*Math.sin(ph)*Math.cos(t), y: r*Math.sin(ph)*Math.sin(t), z: r*Math.cos(ph), r: 0.1, g: 0.1, b: 0.2, s: 0.4 };
                } else p = { x:0, y:0, z:0, r:0, g:0, b:0, s:0 };
            }
            else if(tech === 'red') p = getRed(i);
            else if(tech === 'void') p = getVoid(i);
            else if(tech === 'purple') p = getPurple(i);
            else if(tech === 'blue') p = getBlue(i);
            else if(tech === 'shrine') p = getShrine(i);
            else p = { x:0, y:0, z:0, r:0, g:0, b:0, s:0 };
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    // Animation
    function animate() {
        requestAnimationFrame(animate);
        
        if (shakeIntensity > 0) {
            renderer.domElement.style.transform = `translate(${(Math.random()-0.5)*shakeIntensity*40}px, ${(Math.random()-0.5)*shakeIntensity*40}px)`;
        } else {
            renderer.domElement.style.transform = 'translate(0,0)';
        }

        // Handle blue explosion timer
        if (blueExplosionActive) {
            blueExplosionTimer++;
            if (blueExplosionTimer > 30) { // Explosion lasts ~30 frames
                blueExplosionActive = false;
                updateState('neutral');
            }
        }

        // Update orb positions based on detected colors
        const updateOrbPositions = (orbArray, colorPositions, baseColor) => {
            orbArray.forEach((orb, idx) => {
                if (idx < colorPositions.length) {
                    const pos = colorPositions[idx];
                    // Convert from video space (0-1) to world space
                    const worldX = (pos.x - 0.5) * 50;
                    const worldY = (0.5 - pos.y) * 30;
                    const worldZ = 20 + Math.random() * 10;
                    
                    orb.targetPosition.set(worldX, worldY, worldZ);
                } else {
                    // Hide if no finger detected
                    orb.targetPosition.set(0, -100, 0);
                }
                
                // Smooth animation
                orb.mesh.position.lerp(orb.targetPosition, 0.15);
                orb.mesh.rotation.x += 0.02;
                orb.mesh.rotation.y += 0.03;
                
                // Glow based on orb activity
                const distance = orb.mesh.position.distanceTo(orb.targetPosition);
                orb.mesh.material.emissiveIntensity = 2 + Math.sin(Date.now() * 0.01) * 0.5;
            });
        };
        
        updateOrbPositions(orbs.blue, coloredOrbPositions.blue, 0x0088ff);
        updateOrbPositions(orbs.red, coloredOrbPositions.red, 0xff3333);
        updateOrbPositions(orbs.purple, coloredOrbPositions.purple, 0xbb00ff);

        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;
        const siz = particles.geometry.attributes.size.array;

        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.1;
            col[i] += (targetColors[i] - col[i]) * 0.1;
        }
        for(let i=0; i<COUNT; i++) siz[i] += (targetSizes[i] - siz[i]) * 0.1;

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        particles.geometry.attributes.size.needsUpdate = true;
        
        // UPDATED ROTATION LOGIC: Locking rotation for Shrine, rotating for others
        if(currentTech === 'red') {
            particles.rotation.z -= 0.1;
        } else if (currentTech === 'purple') {
            particles.rotation.z += 0.2; 
            particles.rotation.y += 0.05;
        } else if (currentTech === 'shrine') {
            // FORCE UPRIGHT: Reset and freeze all rotations
            particles.rotation.set(0, 0, 0); 
        } else if (currentTech === 'blue') {
            particles.rotation.x += 0.08;
            particles.rotation.y -= 0.06;
        } else if (blueExplosionActive) {
            // Spin fast during explosion
            particles.rotation.x += 0.15;
            particles.rotation.y += 0.12;
            particles.rotation.z += 0.1;
        } else {
            // Default Neutral rotation
            particles.rotation.y += 0.005;
        }
        
        // Apply drag velocity smoothing
        if (isDragging) {
            dragVelocityX *= 0.95;
            dragVelocityY *= 0.95;
            if (Math.abs(dragVelocityX) < 0.1 && Math.abs(dragVelocityY) < 0.1) {
                isDragging = false;
            }
        }

        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
